<!DOCTYPE html>
<html lang="en">
    <head>
 <meta charset="UTF-8">
        <title>STEMO TRACKER</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="side-vibe-left">STEMO TRACKER</div>
        <div class="side-vibe-right">STEMO TRACKER</div>
        <nav class="quick-access-drawer">
            <div class="drawer-links">
                <a href="index.html" class="drawer-item">TRACKER</a>
                <a href="about.html" class="drawer-item">ABOUT ME</a>
            </div>
        </nav>
        <div class="container">
            <span class="bg-text">STEMO TRACKER </span>
            <h1> STEMO TRACKER</h1>
            <h2 id="time">00:00:00</h2>
            <div class="buttons">
            <button id="startBtn">GO GO</button>
            <button id="stopBtn">Stop</button>
            <button id="resetBtn">ِAgain</button>
            </div>
        </div>
<div class="image container">
<img src="8485778d-3361-42a6-8fb8-f79a85f4cc56.jpg" alt="timer image" id="TRACKER-img">
</div>
<script src="script.js" defer></script>
<audio id="btn-audio" src="click2.mp3"></audio>
<script>
    const clickSound = document.getElementById("btn-audio");
    const allInteractiveElements = document.querySelectorAll("button, .drawer-item, header nav a, .about-nav a")
    allInteractiveElements.forEach(element => {
        element.addEventListener("click", () => {
            clickSound.currentTime = 0;
            clickSound.play();
        })
    });
</script>
    </body>
</html>
